<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where's My Ship?</title>
    <script src="./main.js" type="module"></script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header>
        <h1>BATTLESHIP</h1>
        <h2 class="player-turn-header">Player Turn: Player 1</h2>
    </header>
    <modal>
        <div class="modal-box"><span class="winning-player"></span> wins!</div>
    </modal>
    <main>
        <div class="direction-selector">
            <input type="radio" value="horizontal" id="horizontal" name="direction">
            <label for="horizontal">Horizontal</label>

            <input type="radio" value="vertical" id="vertical" name="direction">
            <label for="vertical">Vertical</label>
        </div>
        <section class="game-start">
            <h2>Welcome to Battleship!</h2>
            <p>Please select your opponent type below:</p>
            <div class="opponent-buttons">
                <button class="player-opponent" value="player">Player</button>
                <button class="computer-opponent" value="computer">Computer</button>
            </div>
        </section>
        
        <div class="boats">
            <div class="boat">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="boat">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="boat">
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="boat">
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="boat">
                <div></div>
                <div></div>
            </div>
        </div>
    </main>
    
</body>
</html>
