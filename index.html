<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where's My Ship?</title>
    <script src="./main.js" type="module"></script>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header>
        <h1>BATTLESHIP</h1>
        <h2 class="player-turn-header">Player Turn: Player 1</h2>
    </header>
    <modal class="modal-box">
        <div class="modal-text"><span class="winning-player"> </span> wins!</div>
        <div class="start-over-buttons">
            <button class="play-again">Play Again</button>
            <button class="start-over">Start Over</button>
        </div>
    </modal>
    <section class="game-start">
        <h2>Welcome to Battleship!</h2>
        <p>Please select your opponent type below:</p>
        <div class="opponent-buttons">
            <button class="player-opponent" value="player">Player</button>
            <button class="computer-opponent" value="computer">Computer</button>
        </div>
    </section>
    <main>
        <div class="board-container player1">
            <div class="player-header player1-header">
                <p class="player1-name">Player 1</p>
                <p>Score: <span class="player1-score"></span></p>
            </div>
        </div>

        <div class="board-container player2">
            <div class="player-header player2-header">
                <p class="player2-name">Player 2</p>
                <p>Score: <span class="player2-score"></span></p>
            </div>
        </div>
    </main>
    <section class="place-boats-controls">
        <button class="submit">Submit</button>
        <button class="play-game">Play Game!</button>
        <div class="direction-selector">
            <input type="radio" value="horizontal" id="horizontal" name="direction" checked>
            <label for="horizontal">Horizontal</label>

            <input type="radio" value="vertical" id="vertical" name="direction">
            <label for="vertical">Vertical</label>
        </div>
        <div class="boats">
            <div class="boat selected-boat">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="boat">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="boat">
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="boat">
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="boat">
                <div></div>
                <div></div>
            </div>
        </div>
    </section>    
</body>
</html>
